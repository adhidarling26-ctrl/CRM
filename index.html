<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RE-SOLLECT SEARCH</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --neon-blue: #00f2fe;
            --neon-pink: #ff00de;
            --neon-green: #0f0;
            --text-color: #e6edf3;
            --border-color: rgba(0, 242, 254, 0.3);
        }
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2);
            border: 1px solid var(--border-color);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h2 {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
        }
        input {
            flex-grow: 1;
            padding: 12px;
            background-color: #000;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            outline: none;
            color: var(--neon-green);
            font-family: inherit;
        }
        button {
            background-color: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
        }
        button:hover {
            background-color: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 15px var(--neon-blue);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 25px;
            text-align: left;
            border: 1px solid var(--border-color);
        }
        th, td {
            padding: 12px;
            border: 1px solid rgba(0, 242, 254, 0.2);
            font-size: 13px;
        }
        th {
            background-color: rgba(0, 242, 254, 0.05);
            color: var(--neon-pink);
            width: 40%;
        }
        td { color: var(--neon-green); }
    </style>
</head>
<body>

<div class="container">
    <h2>RE-SOLLECT SEARCH</h2>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ENTER LAN ID...">
        <button onclick="searchData()">QUERY</button>
    </div>
    <div id="status"></div>
    <div id="result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
<script>
    // Updated CSV URL from your prompt
    const publicUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSu5_jqpaTD82nyaE_nClF1FIjs7wLsGKCU0DhhiAzdx7fpWVlizbS5PdhEZ_tftEN5Ky-Vkv3wkagW/pub?gid=1390906831&single=true&output=csv";

    function searchData() {
        const query = document.getElementById('searchInput').value.trim().toUpperCase();
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        if (!query) {
            status.innerHTML = "AWAITING INPUT...";
            return;
        }

        status.innerHTML = "SCANNING...";
        resultDiv.innerHTML = "";

        Papa.parse(publicUrl, {
            download: true,
            header: true,
            skipEmptyLines: true,
            complete: function(results) {
                const data = results.data;
                // Search specifically in the 'LAN_ID' column
                const foundRow = data.find(row => 
                    row.LAN_ID && row.LAN_ID.toString().trim().toUpperCase() === query
                );

                if (foundRow) {
                    status.innerHTML = "<span style='color:var(--neon-green)'>MATCH FOUND</span>";
                    let table = "<table>";
                    for (let key in foundRow) {
                        table += `<tr><th>${key}</th><td>${foundRow[key]}</td></tr>`;
                    }
                    resultDiv.innerHTML = table + "</table>";
                } else {
                    status.innerHTML = "<span style='color:var(--neon-pink)'>NO MATCH IN DATABASE</span>";
                }
            },
            error: function() {
                status.innerHTML = "<span style='color:red;'>SYSTEM ERROR: CHECK CONNECTION</span>";
            }
        });
    }
</script>
</body>
</html>
